version: 2
# Version updates disabled (open-pull-requests-limit: 0). This is a vendored Quartz
# repo — framework dependencies are updated via `npx quartz upgrade`, not piecemeal
# Dependabot bumps, which would drift from upstream's tested set.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      production-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      ci-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
